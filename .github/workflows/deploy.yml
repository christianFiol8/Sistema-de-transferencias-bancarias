name: CI/CD — Build, Push y Deploy a Docker Swarm

on:
  push:
    branches:
      - main

env:
  DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
  IMAGE_BACKEND:   ${{ secrets.DOCKER_HUB_USER }}/banco-nexus-backend
  IMAGE_FRONTEND:  ${{ secrets.DOCKER_HUB_USER }}/banco-nexus-frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build y Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build y Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  deploy:
    name: Rolling Update en Docker Swarm (AWS EC2)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar SSH hacia el manager de Swarm
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Agregar host a known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_MANAGER_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar docker-stack.yml al servidor
        run: |
          scp docker-stack.yml ${{ secrets.EC2_USER }}@${{ secrets.EC2_MANAGER_HOST }}:~/docker-stack.yml

      - name: Ejecutar rolling update en el Swarm
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_MANAGER_HOST }} "
            export DOCKER_IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            export DOCKER_IMAGE_FRONTEND=${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            export MONGO_URI='${{ secrets.MONGO_URI }}'
            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            docker stack deploy \
              --compose-file ~/docker-stack.yml \
              --with-registry-auth \
              banco-nexus
            echo '✅ Rolling update completado'
          "
