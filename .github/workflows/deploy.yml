name: CI/CD Docker Swarm

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: banco-nexus-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/sistema-de-transferencias-bancarias-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/sistema-de-transferencias-bancarias-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/sistema-de-transferencias-bancarias-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/sistema-de-transferencias-bancarias-frontend:${{ github.sha }}

      - name: Copy stack file to manager
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-stack.yml"
          target: "/home/${{ secrets.SSH_USER }}/sistema-de-transferencias-bancarias"

      - name: Deploy stack on swarm manager
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p /home/${{ secrets.SSH_USER }}/sistema-de-transferencias-bancarias
            cd /home/${{ secrets.SSH_USER }}/sistema-de-transferencias-bancarias
            docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" -p "${{ secrets.DOCKER_HUB_TOKEN }}"
            docker stack deploy --with-registry-auth -c docker-stack.yml banco-nexus
            docker service ls
            docker stack ps banco-nexus