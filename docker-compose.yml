# Para desarrollo local (NO es Docker Swarm)
# Para producción usar: docker stack deploy -c docker-stack.yml banco-nexus

version: '3.8'

services:
  backend:
    build: ./backend
    container_name: banco-nexus-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: banco-nexus-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
